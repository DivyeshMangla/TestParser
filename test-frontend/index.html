<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Timetable Preview</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar">
        <div>
          <h1>Timetable Preview</h1>
          <p>Load a parsed timetable JSON, choose your batch, and verify the classes.</p>
        </div>
        <div class="status" id="loadStatus">Loading bundled JSON files...</div>
      </header>

      <section class="controls" aria-label="Timetable controls">
        <label>
          Timetable JSON
          <select id="datasetSelect"></select>
        </label>

        <label>
          Batch
          <select id="batchSelect"></select>
        </label>

        <label class="checkbox-row">
          <input id="hasElectives" type="checkbox" />
          I have electives
        </label>

        <label>
          Upload timetable JSON
          <input id="jsonUpload" type="file" accept="application/json,.json" />
        </label>

        <label>
          Upload subjects.json
          <input id="subjectsUpload" type="file" accept="application/json,.json" />
        </label>
      </section>

      <section id="alertPanel" class="alert-panel" hidden></section>

      <section class="electives-panel" id="electivesPanel" hidden>
        <h2>Electives</h2>
        <div id="electiveChoices" class="elective-grid"></div>
      </section>

      <section class="timetable-wrap">
        <table id="timetable" class="timetable" aria-label="Generated timetable"></table>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
